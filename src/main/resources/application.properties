spring.application.name=EXTRA_Peliculas_MVC

# ?? Servidor ???????????????????????????????????????????????????????????????
server.port=8080

# ?? H2 en memoria ??????????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:cineapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? Consola H2 (solo desarrollo) ???????????????????????????????????????????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JPA / Hibernate ????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Imprescindible desde Spring Boot 2.5+:
# garantiza que data.sql se ejecuta DESPUÉS de que Hibernate crea las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ?? API REST de películas (cliente) ????????????????????????????????????????
api.movies.base-url=http://localhost:8081/api

# ?? Thymeleaf ??????????????????????????????????????????????????????????????
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ?? Logging (opcional, útil en desarrollo) ?????????????????????????????????
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

logging.level.es.daw.extra_peliculas_mvc=TRACE

